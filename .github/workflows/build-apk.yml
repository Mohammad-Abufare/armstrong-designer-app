name: Build Android APK

# Builds an installable, standalone release APK in the cloud (no local tools needed).
# Runs automatically on every push, and can be started by hand from the Actions tab.

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      # Generate the native android/ project from the Expo config (includes react-native-webview autolinking).
      - name: Expo prebuild (android)
        run: npx expo prebuild --platform android --no-install --clean

      # Release build: bundles the JS into the APK and signs it with the template debug keystore,
      # so the .apk installs and runs on a phone with no dev server and no extra signing setup.
      - name: Build release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: armstrong-designer-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
